<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrello | Gisou</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="cart.css">
</head>

<body>

    <!-- HEADER -->
    <header class="cart-header">
        <a href="index.html" class="back-link">
            <span class="back-arrow">←</span> Torna allo shop
        </a>
        <div class="header-logo">GISOU</div>
        <div class="header-spacer"></div>
    </header>

    <!-- MAIN -->
    <main class="cart-main">

        <!-- TITOLO -->
        <div class="cart-title-block">
            <p class="cart-eyebrow">Il tuo ordine</p>
            <h1 class="cart-title">Carrello</h1>
            <div class="gold-divider"></div>
        </div>

        <!-- LAYOUT DUE COLONNE -->
        <div class="cart-layout">

            <!-- COLONNA SINISTRA: prodotti -->
            <div class="cart-items-col">
                <div id="cart"></div>
            </div>

            <!-- COLONNA DESTRA: riepilogo + immagine -->
            <div class="cart-summary-col">

                <!-- IMMAGINE PRODOTTO -->
                <div class="product-image-wrap">
                    <img src="assets/gisou-product.jpeg" alt="Gisou Honey Gloss" class="product-image">
                    <div class="product-image-caption">Honey Infused Hair Oil</div>
                </div>

                <!-- RIEPILOGO ORDINE -->
                <div class="order-summary">
                    <h2 class="summary-title">Riepilogo ordine</h2>
                    <div class="summary-row">
                        <span>Spedizione</span>
                        <span class="summary-value">Gratuita</span>
                    </div>
                    <div class="summary-divider"></div>
                    <div id="total" class="summary-total"></div>

                    <div class="buttons">
                        <a href="#" class="btn btn-checkout">Procedi al Checkout</a>
                        <a href="index.html" class="btn btn-shop">Continua lo Shopping</a>
                    </div>

                    <p class="secure-note">🔒 Pagamento sicuro e protetto</p>
                </div>

            </div>
        </div>

    </main>

    <script src="cart.js"></script>

</body>
</html>

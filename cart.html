<!DOCTYPE html>

<html lang="it">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Carrello | Gisou</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body {
    background: #ffffff;
    color: #000000;
    font-family: 'Inter', sans-serif;
}
    
.container{
    max-width:1200px;
    margin:auto;
    padding:80px 30px;
}

h1{
    font-size:48px;
    margin-bottom:40px;
}

.empty-cart{
    font-size:20px;
    opacity:.7;
}

.item{
    display:flex;
    justify-content:space-between;
    align-items:center;

    border:1px solid rgba(255,255,255,.1);
    border-radius:16px;

    padding:20px;
    margin-bottom:20px;

    background:rgba(255,255,255,.03);
}

.item-info h3{
    margin-bottom:10px;
}

.price{
    color:#D4AF37;
    font-size:20px;
    font-weight:600;
}

.quantity{
    opacity:.8;
}

.total{
    margin-top:40px;
    font-size:28px;
    color:#D4AF37;
}

.buttons{
    margin-top:40px;
    display:flex;
    gap:20px;
}

.btn{
    display:inline-block;
    padding:14px 28px;
    border-radius:40px;
    text-decoration:none;
    transition:.3s;
}

.btn-shop{
    border:1px solid rgba(255,255,255,.2);
    color:white;
}

.btn-checkout{
    background:#D4AF37;
    color:black;
    font-weight:600;
}

.btn:hover{
    transform:translateY(-2px);
}
</style>

</head>

<body>

<div class="container">

```
<h1>🛒 Il tuo carrello</h1>

<div id="cart"></div>

<div id="total" class="total"></div>

<div class="buttons">
    <a href="index.html" class="btn btn-shop">
        Continua lo shopping
    </a>

    <a href="#" class="btn btn-checkout">
        Checkout
    </a>
</div>
```

</div>

<script>

const cart = JSON.parse(localStorage.getItem("cart")) || [];

const container = document.getElementById("cart");
const totalBox = document.getElementById("total");

if(cart.length === 0){

    container.innerHTML = `
        <p class="empty-cart">
            Il carrello è vuoto.
        </p>
    `;

}else{

    let total = 0;

    cart.forEach(item => {

        total += item.price * item.quantity;

        container.innerHTML += `
            <div class="item">

                <div class="item-info">
                    <h3>${item.name}</h3>
                    <div class="price">€${item.price}</div>
                </div>

                <div class="quantity">
                    Quantità: ${item.quantity}
                </div>

            </div>
        `;
    });

    totalBox.innerHTML = `Totale: €${total.toFixed(2)}`;
}

</script>

</body>
</html>

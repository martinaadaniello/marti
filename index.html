<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gisou | The Honey Universe</title>
  <meta name="description" content="Discover the golden standard of lip care.">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav id="custom-navbar">
    <div class="nav-left">
        <a href="#">Shop ▼</a>
        <a href="#">Collections ▼</a>
        <a href="#">About ▼</a>
    </div>

    <div class="nav-logo">
        <img src="assets/gisou-logo.svg" alt="Gisou">
    </div>

    <div class="nav-right">
        <a href="#">Search</a>
        <a href="#">Account</a>
        <a href="acquisto.html">Cart</a>
    </div>
</nav>

<div class="scroll-container">
    <div class="sticky-section">

        <!-- Videos -->
        <div class="video-container">
            <video id="vid1" src="assets/01-product-reveal.mp4" muted playsinline preload="auto" class="story-video active"></video>

            <video id="vid2" src="assets/02-honey-universe.mp4" muted playsinline preload="auto" class="story-video"></video>

            <video id="vid3" src="assets/03-final-hero.mp4" muted playsinline preload="auto" class="story-video"></video>
        </div>

    </div>
</div>

<!-- LIQUID GLASS ADD TO CART -->

<div style="
position:fixed;
bottom:50px;
left:50%;
transform:translateX(-50%);
z-index:999999;
">

<a
    href="#"
    id="add-to-cart"
    class="liquid-buy-btn"
>
    ADD TO CART
</a>

</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

    const button = document.getElementById("add-to-cart");

    button.addEventListener("click", (e) => {

        e.preventDefault();

        const cart =
            JSON.parse(localStorage.getItem("cart")) || [];

        const existingProduct =
            cart.find(
                item => item.name === "Honey Infused Lip Oil"
            );

        if (existingProduct) {

            existingProduct.quantity += 1;

        } else {

            cart.push({
                name: "Honey Infused Lip Oil",
                price: 28,
                quantity: 1,
                image: "assets/product.jpg"
            });

        }

        localStorage.setItem(
            "cart",
            JSON.stringify(cart)
        );

        button.innerHTML = "✓ ADDED";

        setTimeout(() => {
            window.location.href = "acquisto.html";
        }, 700);

    });

});
</script>
<script>
document.addEventListener("DOMContentLoaded", () => {

    const videos = [
        document.getElementById("vid1"),
        document.getElementById("vid2"),
        document.getElementById("vid3")
    ];

    let currentIndex = 0;

    function showVideo(index) {

        videos.forEach((v, i) => {
            if (i === index) {
                v.style.opacity = 1;
                v.style.zIndex = 2;
                v.play();
            } else {
                v.style.opacity = 0;
                v.pause();
            }
        });

    }

    showVideo(0);

    window.addEventListener("scroll", () => {

        const scrollY = window.scrollY;
        const maxScroll = document.body.scrollHeight - window.innerHeight;

        const progress = scrollY / maxScroll;

        const newIndex =
            Math.min(
                videos.length - 1,
                Math.floor(progress * videos.length)
            );

        if (newIndex !== currentIndex) {
            currentIndex = newIndex;
            showVideo(currentIndex);
        }

    });

});
</script>

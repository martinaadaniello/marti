<script>
document.addEventListener("DOMContentLoaded", async () => {

    const videos = [
        document.getElementById("vid1"),
        document.getElementById("vid2"),
        document.getElementById("vid3")
    ];

    // aspetta che tutti i video abbiano metadata
    await Promise.all(videos.map(v =>
        new Promise(res => v.addEventListener("loadedmetadata", res))
    ));

    const durations = videos.map(v => v.duration);

    // IMPORTANTISSIMO: pausa tutti
    videos.forEach(v => {
        v.pause();
        v.currentTime = 0;
    });

    let ticking = false;

    function updateVideos() {

        const scrollTop = window.scrollY;
        const maxScroll = document.body.scrollHeight - window.innerHeight;

        const progress = scrollTop / maxScroll;

        const segment = 1 / videos.length;

        videos.forEach((video, i) => {

            const start = segment * i;
            const end = segment * (i + 1);

            let localProgress = (progress - start) / (end - start);

            localProgress = Math.max(0, Math.min(1, localProgress));

            video.currentTime = localProgress * durations[i];

        });

        ticking = false;
    }

    window.addEventListener("scroll", () => {
        if (!ticking) {
            requestAnimationFrame(updateVideos);
            ticking = true;
        }
    });

});

<script>
document.addEventListener("DOMContentLoaded", () => {

    const button = document.getElementById("add-to-cart");

    button.addEventListener("click", (e) => {

        e.preventDefault();

        const cart =
            JSON.parse(localStorage.getItem("cart")) || [];

        const existingProduct =
            cart.find(
                item => item.name === "Honey Infused Lip Oil"
            );

        if (existingProduct) {

            existingProduct.quantity += 1;

        } else {

            cart.push({
                name: "Honey Infused Lip Oil",
                price: 28,
                quantity: 1,
                image: "assets/product.jpg"
            });

        }

        localStorage.setItem(
            "cart",
            JSON.stringify(cart)
        );

        button.innerHTML = "✓ ADDED";

        setTimeout(() => {
            window.location.href = "acquisto.html";
        }, 700);

    });

});
</script>
<script>
document.addEventListener("DOMContentLoaded", () => {

    const videos = [
        document.getElementById("vid1"),
        document.getElementById("vid2"),
        document.getElementById("vid3")
    ];

    let currentIndex = 0;

    function showVideo(index) {

        videos.forEach((v, i) => {
            if (i === index) {
                v.style.opacity = 1;
                v.style.zIndex = 2;
                v.play();
            } else {
                v.style.opacity = 0;
                v.pause();
            }
        });

    }

    showVideo(0);

    window.addEventListener("scroll", () => {

        const scrollY = window.scrollY;
        const maxScroll = document.body.scrollHeight - window.innerHeight;

        const progress = scrollY / maxScroll;

        const newIndex =
            Math.min(
                videos.length - 1,
                Math.floor(progress * videos.length)
            );

        if (newIndex !== currentIndex) {
            currentIndex = newIndex;
            showVideo(currentIndex);
        }

    });

});
</script>

<div class="video-container">
    <video id="vid1" src="assets/01-product-reveal.mp4" muted playsinline preload="metadata" class="story-video"></video>

    <video id="vid2" src="assets/02-honey-universe.mp4" muted playsinline preload="metadata" class="story-video"></video>

    <video id="vid3" src="assets/03-final-hero.mp4" muted playsinline preload="metadata" class="story-video"></video>
</div>

<script>
document.addEventListener("DOMContentLoaded", async () => {

    const videos = [
        document.getElementById("vid1"),
        document.getElementById("vid2"),
        document.getElementById("vid3")
    ];

    // blocca qualsiasi autoplay
    videos.forEach(v => {
        v.pause();
        v.currentTime = 0;
    });

    // aspetta metadata video
    await Promise.all(
        videos.map(v =>
            new Promise(res => v.addEventListener("loadedmetadata", res))
        )
    );

    const durations = videos.map(v => v.duration);

    let ticking = false;

    function updateVideos() {

        const scrollTop = window.scrollY;
        const maxScroll = document.body.scrollHeight - window.innerHeight;

        const progress = maxScroll > 0 ? (scrollTop / maxScroll) : 0;

        const segment = 1 / videos.length;

        videos.forEach((video, i) => {

            const start = segment * i;
            const end = segment * (i + 1);

            let localProgress = (progress - start) / (end - start);

            localProgress = Math.max(0, Math.min(1, localProgress));

            video.currentTime = localProgress * durations[i];

        });

        ticking = false;
    }

    window.addEventListener("scroll", () => {
        if (!ticking) {
            requestAnimationFrame(updateVideos);
            ticking = true;
        }
    });

});
</script>
